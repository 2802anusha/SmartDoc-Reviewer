<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDoc Reviewer</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#0d1117;
            color:#e6edf3;
            margin:0;
            padding:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .card{
            background:#161b22;
            border-radius:10px;
            padding:20px;
            margin-bottom:20px;
            border:1px solid #30363d;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #444;
            background:#0d1117;
            color:white;
        }

        button{
            background:#238636;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#2ea043;
        }

        a{
            color:#58a6ff;
            text-decoration:none;
        }

        .badge{
            padding:4px 10px;
            border-radius:12px;
            font-size:12px;
            background:#30363d;
        }

        .spinner{
            width:16px;
            height:16px;
            border:3px solid #555;
            border-top:3px solid white;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            from{transform:rotate(0deg);}
            to{transform:rotate(360deg);}
        }

        .job-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 0;
            border-bottom:1px solid #30363d;
        }

        .empty-state{
            color:#8b949e;
            text-align:center;
            padding:20px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🤖 SmartDoc Reviewer</h1>

{% block content %}
{% endblock %}

</div>

</body>
</html>
